# Deep Sleep after 15min of inactivity
CONFIG_ZMK_PM_SOFT_OFF=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Logging
# CONFIG_ZMK_USB_LOGGING=y

# Save config to flash more frequently
# Default is 60s and this lowers it to 10
# Only use this setting for debugging.
# Prolonged use can lead to flash chip degradation
# CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE 10000

CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_RGB_UNDERGLOW=y
# Use the STRIP config specific to the LEDs you're using
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y

# 1. Kích hoạt module hiệu ứng mở rộng vừa cài ở trên
CONFIG_ZMK_RGB_FX=y

# 2. Bật duy nhất hiệu ứng gõ nút nào sáng nút đó (Reactive Tap)
CONFIG_ZMK_RGB_FX_REACTIVE_TAP=y

# 3. Đặt màu xanh lá chuối (Lime) làm màu mặc định khi nút sáng lên
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=85
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=60

# 4. Tự động tắt hẳn LED sau 15 giây không gõ để cứu pin tuyệt đối
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
